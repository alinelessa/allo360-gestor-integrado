<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título (importante para SEO) -->
    <title>Allo360 | Gestor Integrado para Empresas</title>

    <!-- Ícone da aba (favicon) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Descrição para Google -->
    <meta
      name="description"
      content="Allo360 é um gestor integrado completo para empresas. Controle vendas, estoque, financeiro e relatórios em um único sistema online."
    />

    <!-- Palavras-chave (não é mais tão forte para Google, mas ajuda) -->
    <meta
      name="keywords"
      content="gestor integrado, sistema de gestão empresarial, ERP online, controle financeiro, controle de estoque, gestão de vendas"
    />

    <meta name="author" content="Allo360" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (para redes sociais) -->
    <meta property="og:title" content="Allo360 | Gestor Integrado para Empresas" />
    <meta
      property="og:description"
      content="Sistema completo de gestão empresarial com controle financeiro, estoque, vendas e relatórios."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seusite.com.br" />
    <meta property="og:image" content="https://seusite.com.br/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Allo360 | Gestor Integrado" />
    <meta
      name="twitter:description"
      content="Gestor integrado completo para empresas que querem crescer com controle total."
    />
    <meta name="twitter:image" content="https://seusite.com.br/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
